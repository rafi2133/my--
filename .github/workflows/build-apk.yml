name: Build Flet APK

on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flet[build]

    - name: Build APK
      run: flet build apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-assistant-apk
        path: build/apk/*.apk